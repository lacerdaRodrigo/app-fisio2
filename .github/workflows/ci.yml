name: CI - Verificação de Qualidade

# Roda em toda PR para develop/master e em pushes de branches auxiliares.
# Objetivo: garantir que o código compila, passa no lint e nos testes.
# Esta pipeline NÃO publica nada.
on:
  pull_request:
    branches: [develop, master]
  push:
    branches-ignore: [develop, master]

jobs:
  verificar:
    name: Lint, testes e build web
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Baixar o código (checkout)
        uses: actions/checkout@v4

      - name: 🐦 Instalar o Flutter (3.44.1)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: 📦 Baixar dependências (flutter pub get)
        run: |
          echo "::group::Baixando pacotes do projeto"
          flutter pub get
          echo "::endgroup::"

      - name: 🔎 Análise estática (lint)
        run: |
          echo "Conferindo o código com 'flutter analyze'..."
          flutter analyze

      - name: 🧪 Rodar testes (com cobertura)
        run: |
          echo "Executando todos os testes do projeto..."
          flutter test --coverage

      - name: 🌐 Compilar a versão web (teste de build)
        run: |
          echo "Garantindo que o app web compila sem erros..."
          flutter build web --release --base-href=/

      - name: ✅ Tudo certo
        run: echo "Verificação concluída com sucesso! Código pronto para merge."
