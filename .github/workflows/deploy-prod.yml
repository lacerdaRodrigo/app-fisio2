name: Deploy de Produção (master)

# A cada push na branch 'master': incrementa a versão, compila,
# publica o site oficial no Firebase e registra a nova versão (commit).
on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy-prod:
    name: Publicar em produção
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Conferir credencial do Firebase
        env:
          CRED: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$CRED" ]; then
            echo "::error::O secret FIREBASE_SERVICE_ACCOUNT está VAZIO."
            echo "Verifique em GitHub > Settings > Secrets and variables > Actions:"
            echo "  - o valor precisa estar na aba 'Secrets' (NÃO 'Variables')"
            echo "  - o nome precisa ser exatamente: FIREBASE_SERVICE_ACCOUNT"
            echo "  - o conteúdo precisa ser o JSON COMPLETO da conta de serviço"
            exit 1
          fi
          echo "✅ Credencial do Firebase encontrada."

      - name: 📥 Baixar o código (checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐦 Instalar o Flutter (3.44.1)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: 📦 Baixar dependências (flutter pub get)
        run: flutter pub get

      - name: 🔎 Análise estática (lint)
        run: flutter analyze

      - name: 🧪 Rodar testes
        run: flutter test

      - name: 🏷️ Incrementar a versão (patch +1)
        id: versao
        run: |
          V=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          MAJOR=$(echo "$V" | cut -d'.' -f1)
          MINOR=$(echo "$V" | cut -d'.' -f2)
          PATCH=$(echo "$V" | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VER="$MAJOR.$MINOR.$NEW_PATCH"
          NEW_FULL="$NEW_VER+0"
          BUILD_TS=$(date +%s)
          sed -i "s/^version: .*/version: $NEW_FULL/" pubspec.yaml
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VER\"/" web/version.json
          sed -i "s/\"build\": \".*\"/\"build\": \"$BUILD_TS\"/" web/version.json
          echo "app_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Versão: v$V  ->  v$NEW_VER"

      - name: 🌐 Compilar o app web
        run: |
          echo "Compilando a versão web (release) v${{ steps.versao.outputs.app_version }}..."
          flutter build web --release --base-href=/ \
            --dart-define=GOOGLE_OAUTH_CLIENT_ID_WEB=${{ secrets.GOOGLE_OAUTH_CLIENT_ID_WEB }} \
            --dart-define=GOOGLE_OAUTH_CLIENT_ID_ANDROID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID_ANDROID }} \
            --dart-define=APP_VERSION=${{ steps.versao.outputs.app_version }}

      - name: 📄 Copiar páginas públicas (privacidade, termos, verificação Google)
        run: |
          cp branding/privacidade.html build/web/privacidade.html
          cp branding/termos.html build/web/termos.html
          cp branding/google505e804a9d870920.html build/web/google505e804a9d870920.html
          echo "Páginas públicas copiadas."

      - name: 🚀 Publicar o site oficial (produção)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json

          RESULT=$(npx firebase-tools@latest deploy --only hosting --project app-fisio-care-2 2>&1) || DEPLOY_FAILED=true

          echo "$RESULT"

          if [[ "$DEPLOY_FAILED" == "true" ]]; then
            if echo "$RESULT" | grep -q "is the current active version"; then
              echo "✅ Conteúdo idêntico ao que já está no ar — nenhuma mudança necessária."
            else
              echo "❌ Falha no deploy."
              rm -f /tmp/firebase-sa.json
              exit 1
            fi
          fi

          rm -f /tmp/firebase-sa.json

      - name: 💾 Registrar a nova versão (commit do bump)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml web/version.json
          git diff --staged --quiet && echo "Nada para commitar." && exit 0
          git commit -m "chore: bump versão para ${{ steps.versao.outputs.app_version }} [skip ci]"
          git pull --rebase origin master
          git push
          echo "Versão v${{ steps.versao.outputs.app_version }} registrada no repositório."

      - name: ✅ Concluído
        run: echo "Produção publicada! Acesse https://app-fisio-care-2.web.app"
