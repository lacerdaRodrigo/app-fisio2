<body>
  <script>
    // Desabilita o service worker para evitar cache obsoleto entre deploys.
    // Com o service worker ativo, o navegador ignora os headers Cache-Control
    // do Firebase e serve arquivos antigos mesmo após uma nova publicação.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (var i = 0; i < registrations.length; i++) {
          registrations[i].unregister();
        }
      });
      navigator.serviceWorker.register = function () {
        return Promise.resolve({
          active: null, installing: null, waiting: null, updatefound: null,
          unregister: function () { return Promise.resolve(true); }
        });
      };
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
