name: Cadastro de Paciente — Fluxo Feliz (CT-PC01)
description: Login → Navegar Pacientes → Adicionar novo → Validar
tier: smoke

dependencies:
  - login_success.yaml

setup:
  - action: launch_app
  - action: ensure_logged_in  # Re-usa o fluxo de login se necessário

steps:
  # Aguarda Dashboard
  - action: wait_for_element
    selector: text:Boa noite
    timeout: 5s

  # Navega para Pacientes
  - action: tap_text
    text: Pacientes
    timeout: 2s
    wait_after: 1s

  # Verifica que está na tela de Pacientes
  - action: wait_for_element
    selector: text:Pacientes
    timeout: 3s

  # Clica FAB de novo paciente
  - action: tap
    selector: icon:add
    timeout: 2s
    wait_after: 1s

  # Aguarda tela de cadastro
  - action: wait_for_element
    selector: text:Cadastrar Paciente
    timeout: 3s

  # Preenche nome
  - action: enter_text
    selector: placeholder:Nome Completo
    text: João Silva
    wait_after: 300ms

  # Preenche CPF
  - action: enter_text
    selector: placeholder:CPF
    text: 12345678901
    wait_after: 300ms

  # Preenche telefone
  - action: enter_text
    selector: placeholder:Telefone
    text: 11999999999
    wait_after: 300ms

  # Preenche data nascimento
  - action: enter_text
    selector: placeholder:Data de Nascimento
    text: 01/01/1980
    wait_after: 300ms

  # Preenche endereço
  - action: enter_text
    selector: placeholder:Endereço
    text: Rua Test, 123
    wait_after: 300ms

  # Clica Salvar Paciente
  - action: tap_text
    text: Salvar Paciente
    timeout: 2s
    wait_after: 2s

  # Retorna à lista de pacientes
  - action: wait_for_element
    selector: text:Pacientes
    timeout: 3s

  # Novo paciente deve aparecer na lista
  - action: wait_for_element
    selector: text:João Silva
    timeout: 3s

assertions:
  - element: text:Pacientes
    visible: true
    reason: Deve estar na lista de pacientes

  - element: text:João Silva
    visible: true
    reason: Novo paciente deve aparecer na lista

tags:
  - critical
  - paciente
  - crud
  - form-validation
